<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:8848 ws://localhost:8848; img-src 'self' data: blob:; font-src 'self' data:;">
  <title>CCCC</title>
  <style>
    /* Loading screen styles */
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .loading-container {
      text-align: center;
    }

    .logo {
      font-size: 4rem;
      margin-bottom: 1rem;
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(255, 255, 255, 0.1);
      border-top-color: #4f8cff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .status {
      color: #8892a0;
      font-size: 0.9rem;
    }

    .error {
      color: #ff6b6b;
      display: none;
    }

    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="loading-container">
    <div class="logo">🤖</div>
    <div class="spinner" id="spinner"></div>
    <div class="status" id="status">Starting CCCC...</div>
    <div class="error" id="error"></div>
  </div>

  <script>
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const spinnerEl = document.getElementById('spinner');

    // Wait for the backend to be ready, then redirect
    async function waitForBackend() {
      const maxAttempts = 60;  // 30 seconds
      const interval = 500;    // 500ms

      for (let i = 0; i < maxAttempts; i++) {
        try {
          statusEl.textContent = 'Connecting to backend...';

          const response = await fetch('http://localhost:8848/api/v1/ping');

          if (response.ok) {
            statusEl.textContent = 'Backend ready, loading application...';

            // Redirect to the main UI
            setTimeout(() => {
              window.location.href = 'http://localhost:8848/ui/';
            }, 500);

            return;
          }
        } catch (e) {
          // Backend not ready yet
          if (i === 10) {
            statusEl.textContent = 'Waiting for backend...';
          } else if (i === 30) {
            statusEl.textContent = 'Still starting up...';
          }
        }

        await new Promise(r => setTimeout(r, interval));
      }

      // Timeout error
      spinnerEl.style.display = 'none';
      statusEl.style.display = 'none';
      errorEl.textContent = 'Failed to connect to backend. Please restart the application.';
      errorEl.classList.add('show');
    }

    // Start waiting
    waitForBackend();
  </script>
</body>
</html>
