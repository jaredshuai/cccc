name: Desktop Packaging

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Build stage to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - prep
          - web
          - backend
          - app
          - bundle
          - verify
      channel:
        description: "Build channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - canary
      version:
        description: "Build version label (auto or custom)"
        required: true
        default: "auto"
      upload_artifacts:
        description: "Upload desktop artifacts"
        required: true
        default: true
        type: boolean
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: read

concurrency:
  group: desktop-packaging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
          - platform: macos
            runner: macos-latest
          - platform: linux
            runner: ubuntu-latest
    env:
      BUILD_STAGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.stage || 'all' }}
      BUILD_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'stable' }}
      BUILD_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || 'auto' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            cmake \
            pkg-config

      - name: Build desktop (Windows)
        if: runner.os == 'Windows'
        run: |
          cmd /c desktop\scripts\build.cmd --stage %BUILD_STAGE% --platform windows --channel %BUILD_CHANNEL% --version %BUILD_VERSION%

      - name: Build desktop (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          chmod +x desktop/scripts/build.sh
          ./desktop/scripts/build.sh --stage "${BUILD_STAGE}" --platform "${{ matrix.platform }}" --channel "${BUILD_CHANNEL}" --version "${BUILD_VERSION}"

      - name: Upload release directory
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.upload_artifacts == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ env.BUILD_CHANNEL }}-${{ env.BUILD_VERSION }}
          path: desktop/release/${{ matrix.platform }}/${{ env.BUILD_CHANNEL }}/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Desktop Artifacts
    if: startsWith(github.ref, 'refs/tags/desktop-v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: false

      - name: Pack release payloads
        run: |
          mkdir -p publish
          for d in all-artifacts/*; do
            [ -d "$d" ] || continue
            name="$(basename "$d")"
            tar -czf "publish/${name}.tar.gz" -C "$d" .
          done
          ls -lah publish

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: publish/*.tar.gz
          generate_release_notes: true
