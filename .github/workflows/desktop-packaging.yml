name: Desktop Packaging

on:
  workflow_dispatch:
    inputs:
      stage:
        description: "Build stage to run"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - prep
          - web
          - backend
          - app
          - bundle
          - verify
      platform:
        description: "Target platform for manual run"
        required: true
        default: "windows"
        type: choice
        options:
          - windows
          - macos
          - linux
          - all
      channel:
        description: "Build channel"
        required: true
        default: "stable"
        type: choice
        options:
          - stable
          - canary
      version:
        description: "Build version label (auto or custom)"
        required: true
        default: "auto"
        type: string
      upload_artifacts:
        description: "Upload desktop artifacts"
        required: true
        default: true
        type: boolean
      publish_release:
        description: "Publish a GitHub Release from this run"
        required: true
        default: false
        type: boolean
      release_tag:
        description: "Release tag to create/update (optional)"
        required: false
        default: ""
        type: string
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: read

concurrency:
  group: desktop-packaging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 300
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
          - platform: macos
            runner: macos-latest
          - platform: linux
            runner: ubuntu-latest
    env:
      BUILD_STAGE: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.stage || 'all' }}
      BUILD_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'stable' }}
      BUILD_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || 'auto' }}
    steps:
      - name: Select platform scope
        id: platform_gate
        shell: bash
        run: |
          TARGET="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.platform || 'all' }}"
          if [ "${TARGET}" != "all" ] && [ "${TARGET}" != "${{ matrix.platform }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Skip ${{ matrix.platform }} (target=${TARGET})"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "Build ${{ matrix.platform }} (target=${TARGET})"
          fi

      - name: Checkout
        if: steps.platform_gate.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Python
        if: steps.platform_gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup uv
        if: steps.platform_gate.outputs.skip != 'true'
        uses: astral-sh/setup-uv@v4

      - name: Setup Bun
        if: steps.platform_gate.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.8"

      - name: Restore Nuitka cache (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: desktop/scripts/.nuitka-cache
          key: nuitka-windows-${{ hashFiles('desktop/scripts/build-nuitka.py', 'desktop/scripts/build.py', 'pyproject.toml') }}
          restore-keys: |
            nuitka-windows-

      - name: Setup MSVC toolchain (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Inno Setup (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not (Get-Command iscc.exe -ErrorAction SilentlyContinue)) {
            choco install innosetup --no-progress -y
          }
          $candidates = @(
            'C:\Program Files (x86)\Inno Setup 6\ISCC.exe',
            'C:\Program Files\Inno Setup 6\ISCC.exe'
          )
          $iscc = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) {
            throw 'ISCC.exe not found after installation'
          }
          (Split-Path $iscc) | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Linux build dependencies
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfuse2 \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            build-essential \
            cmake \
            pkg-config

      - name: Build prep (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows' && env.BUILD_STAGE == 'all'
        timeout-minutes: 10
        run: |
          cmd /c desktop\scripts\build.cmd --stage prep --platform windows --channel %BUILD_CHANNEL% --version %BUILD_VERSION%

      - name: Build web (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows' && env.BUILD_STAGE == 'all'
        timeout-minutes: 20
        run: |
          cmd /c desktop\scripts\build.cmd --stage web --platform windows --channel %BUILD_CHANNEL% --version %BUILD_VERSION%

      - name: Build backend (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows' && env.BUILD_STAGE == 'all'
        timeout-minutes: 180
        env:
          CCCC_NUITKA_WINDOWS_COMPILER: msvc
        run: |
          cmd /c desktop\scripts\build.cmd --stage backend --platform windows --channel %BUILD_CHANNEL% --version %BUILD_VERSION%

      - name: Build app (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows' && env.BUILD_STAGE == 'all'
        timeout-minutes: 30
        run: |
          cmd /c desktop\scripts\build.cmd --stage app --platform windows --channel %BUILD_CHANNEL% --version %BUILD_VERSION%

      - name: Build bundle (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows' && env.BUILD_STAGE == 'all'
        timeout-minutes: 20
        run: |
          cmd /c desktop\scripts\build.cmd --stage bundle --platform windows --channel %BUILD_CHANNEL% --version %BUILD_VERSION%

      - name: Build desktop selected stage (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows' && env.BUILD_STAGE != 'all'
        timeout-minutes: 180
        env:
          CCCC_NUITKA_WINDOWS_COMPILER: msvc
        run: |
          cmd /c desktop\scripts\build.cmd --stage %BUILD_STAGE% --platform windows --channel %BUILD_CHANNEL% --version %BUILD_VERSION%

      - name: Build single-file installer (Windows)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os == 'Windows' && (env.BUILD_STAGE == 'all' || env.BUILD_STAGE == 'bundle')
        timeout-minutes: 30
        run: |
          python desktop/scripts/build-inno-setup.py --delivery-parent "desktop/delivery/windows/$env:BUILD_CHANNEL" --app-name "CCCC" --app-identifier "com.chesterra.cccc" --publisher "ChesterRa"

      - name: Build desktop (macOS/Linux)
        if: steps.platform_gate.outputs.skip != 'true' && runner.os != 'Windows'
        run: |
          chmod +x desktop/scripts/build.sh
          ./desktop/scripts/build.sh --stage "${BUILD_STAGE}" --platform "${{ matrix.platform }}" --channel "${BUILD_CHANNEL}" --version "${BUILD_VERSION}"

      - name: Upload delivery package
        if: ${{ steps.platform_gate.outputs.skip != 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.upload_artifacts == 'true') }}
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.platform }}-${{ env.BUILD_CHANNEL }}-${{ env.BUILD_VERSION }}
          path: desktop/delivery/${{ matrix.platform }}/${{ env.BUILD_CHANNEL }}/
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Desktop Release
    if: startsWith(github.ref, 'refs/tags/desktop-v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      INPUT_RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag || '' }}
      INPUT_CHANNEL: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.channel || 'stable' }}
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: false

      - name: Prepare release assets
        id: prep_release
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p publish

          MANIFEST=$(find all-artifacts -type f -name 'manifest.json' | head -n 1)
          VERSION=$(jq -r '.version' "$MANIFEST")

          if [ -n "${INPUT_RELEASE_TAG}" ]; then
            TAG_NAME="${INPUT_RELEASE_TAG}"
          elif [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF_NAME}"
          else
            TAG_NAME="desktop-v${VERSION}"
          fi

          RELEASE_NAME="CCCC Desktop ${VERSION}"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG_NAME}"

          INSTALLER=$(find all-artifacts -type f -name '*-Setup.exe' | head -n 1)
          cp "$INSTALLER" publish/
          INSTALLER_NAME=$(basename "$INSTALLER")

          PORTABLE_DIR=$(find all-artifacts -type d -name portable | head -n 1)
          if [ -n "${PORTABLE_DIR}" ]; then
            PORTABLE_NAME="${INSTALLER_NAME/-Setup.exe/-Portable.zip}"
            (cd "$PORTABLE_DIR" && zip -qr "$OLDPWD/publish/$PORTABLE_NAME" .)
          fi

          cp "$MANIFEST" "publish/windows-${VERSION}-manifest.json"

          cat > publish/release.md <<EOF
          # CCCC Desktop ${VERSION}

          ## 下载地址

          ### Windows

          #### 安装版（推荐）
          - [${INSTALLER_NAME}](${DOWNLOAD_URL}/${INSTALLER_NAME})

          #### Portable 便携版
          - [${PORTABLE_NAME}](${DOWNLOAD_URL}/${PORTABLE_NAME})

          #### 校验与清单
          - [windows-${VERSION}-manifest.json](${DOWNLOAD_URL}/windows-${VERSION}-manifest.json)

          ## 说明

          - 安装版为单文件 `.exe`，双击即可安装。
          - Portable 便携版解压后可直接运行，无需安装。
          - 若后续出现首屏遮挡或布局异常，优先使用本页最新版本重新下载验证。

          Created by GitHub Actions.
          EOF

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "release_name=${RELEASE_NAME}" >> "$GITHUB_OUTPUT"
          if [ "${INPUT_CHANNEL}" = "stable" ]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          fi

          ls -lah publish

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.prep_release.outputs.tag_name }}
          name: ${{ steps.prep_release.outputs.release_name }}
          body_path: publish/release.md
          prerelease: ${{ steps.prep_release.outputs.prerelease == 'true' }}
          files: |
            publish/*.exe
            publish/*.tar.zst
            publish/*.zip
            publish/*manifest.json

